<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>독서 노트</title>
    
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#1a1a1a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script>if ('serviceWorker' in navigator) { navigator.serviceWorker.register('sw.js'); }</script>

    <style>
        /* --- 핵심 CSS 디자인 --- */
        :root {
            --bg-color: #1a1a1a; /* 어두운 배경 */
            --card-color: #2a2a2a; /* 카드 색상 */
            --accent-color: #6c5ce7; /* 포인트 색상 (보라) */
            --text-main: #fcfcfc;
            --text-sub: #a0a0a0;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; 
            background: var(--bg-color); color: var(--text-main); 
            margin: 0; padding: 0; -webkit-font-smoothing: antialiased;
            overscroll-behavior-y: contain; /* 당겨서 새로고침 방지 */
        }

        /* 메인 컨테이너 */
        .app-container { 
            display: flex; flex-direction: column; min-height: 100vh;
            padding: 20px; box-sizing: border-box; 
        }

        h1, h3 { margin: 0 0 10px 0; font-weight: 700; }
        h1 { font-size: 28px; }
        h3 { font-size: 18px; color: var(--text-sub); }

        /* 입력창 스타일 */
        input[type="password"], input[type="text"], input[type="number"], textarea {
            width: 100%; border: none; background: var(--card-color); 
            color: var(--text-main); border-radius: 12px; padding: 16px; 
            font-size: 16px; margin-bottom: 12px; box-sizing: border-box;
            transition: 0.2s;
        }
        input:focus, textarea:focus { outline: 2px solid var(--accent-color); background: #333; }

        /* 버튼 스타일 */
        .btn {
            border: none; border-radius: 12px; padding: 16px; font-size: 16px; font-weight: 600; 
            cursor: pointer; transition: 0.2s; text-align: center; width: 100%; box-sizing: border-box;
        }
        .btn-main { background: var(--accent-color); color: white; }
